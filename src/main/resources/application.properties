spring.application.name=SmartStore-Backend

# MySQL Database Configuration (Cloud - Aiven)
# Render లోని SPRING_DATASOURCE_URL వేరియబుల్‌ని ఇక్కడ వాడుతున్నాం
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate/JPA Properties
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Gmail SMTP Server Configurations
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=pittab03@gmail.com
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Server Port
server.port=9091